# Nginx 生产配置 — apex 域名 miiooai.com（微信扫码登录回调入口）
#
# 背景：
#   微信开放平台「授权回调域」登记的是 miiooai.com（apex，不带 www）。
#   微信扫码确认后会跳回 https://miiooai.com/?code=...&state=<session_id>，
#   前端 SPA 需要在根路径识别 code/state 并调用
#   /api/auth/wechat/callback/complete 完成授权。
#
#   既有的 backend/nginx/miiooai.conf 只绑定了 www.miiooai.com / miiooaib.com，
#   apex miiooai.com 是独立站点。本文件即 apex 站点的最小可用配置：
#     1) /api 与根路径（含 code/state）反代到同一个 FastAPI(:8000)
#     2) 前端 SPA 历史路由回退到 index.html
#
# 宝塔面板配置文件位置（示例）：
#   /www/server/panel/vhost/nginx/miiooai.com.conf
#
# 修改后重载：nginx -t && nginx -s reload
#
# 注意：apex 与 www 必须指向同一套后端 + 同一份前端构建产物，
#       否则 www 端建立的扫码会话与 apex 端的回调会话对不上。

server
{
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name miiooai.com;
    index index.html index.htm;

    # 前端构建产物目录（与 www 站点共用同一份 dist）
    root /www/wwwroot/miiooaib.com;

    #SSL-START
    #HTTP_TO_HTTPS_START
    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ( $uri ~ /\.well-known/ ) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END

    # apex 证书需覆盖 miiooai.com（与 www 证书可能不同，按实际签发路径修改）
    ssl_certificate    /www/server/panel/vhost/cert/miiooai.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/miiooai.com/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    #一键申请SSL证书验证目录相关设置
    location ~ \.well-known{
        allow all;
    }

    # ─────────────────────────────────────────────────────────────────
    # /api/ — 反代到 FastAPI（与 www 站点同一个 uvicorn :8000）
    #
    # 微信回调链路依赖 /api/auth/wechat/callback/complete，必须可达。
    # ─────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    1800s;
        proxy_send_timeout    1800s;
    }

    # ─────────────────────────────────────────────────────────────────
    # 根路径 + SPA 历史路由回退
    #
    # 微信扫码确认后跳回 https://miiooai.com/?code=...&state=...，
    # try_files 命中 index.html 后由前端 Home.jsx 承接 code/state。
    # ─────────────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|gif|jpg|jpeg|png|bmp|svg|woff2?|ttf)$ {
        expires 12h;
        access_log off;
    }

    access_log  /www/wwwlogs/miiooai.com.log;
    error_log  /www/wwwlogs/miiooai.com.error.log;
}
