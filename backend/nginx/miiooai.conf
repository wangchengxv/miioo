# Nginx 生产配置 — www.miiooai.com / miiooaib.com
#
# 宝塔面板配置文件位置：
#   /www/server/panel/vhost/nginx/miiooaib.com.conf
#
# 修改后重载：nginx -t && nginx -s reload

server
{
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name www.miiooai.com miiooaib.com;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/miiooaib.com;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/miiooaib.com.conf;
    #CERT-APPLY-CHECK--END

    include /www/server/panel/vhost/nginx/extension/miiooaib.com/*.conf;

    #SSL-START
    #error_page 404/404.html;
    #HTTP_TO_HTTPS_START
    set $isRedcert 1;
    if ($server_port != 443) {
        set $isRedcert 2;
    }
    if ( $uri ~ /\.well-known/ ) {
        set $isRedcert 1;
    }
    if ($isRedcert != 1) {
        rewrite ^(/.*)$ https://$host$1 permanent;
    }
    #HTTP_TO_HTTPS_END
    ssl_certificate    /www/server/panel/vhost/cert/miiooaib.com/fullchain.pem;
    ssl_certificate_key    /www/server/panel/vhost/cert/miiooaib.com/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    error_page 497  https://$host$request_uri;
    #SSL-END

    #ERROR-PAGE-START
    error_page 404 /404.html;
    #ERROR-PAGE-END

    #PHP-INFO-START
    include enable-php-82.conf;
    #PHP-INFO-END

    #REWRITE-START
    include /www/server/panel/vhost/rewrite/miiooaib.com.conf;
    #REWRITE-END

    # 禁止访问的敏感文件
    location ~* (\.user.ini|\.htaccess|\.htpasswd|\.env.*|\.project|\.bashrc|\.bash_profile|\.bash_logout|\.DS_Store|\.gitignore|\.gitattributes|LICENSE|README\.md|CLAUDE\.md|CHANGELOG\.md|CHANGELOG|CONTRIBUTING\.md|TODO\.md|FAQ\.md|composer\.json|composer\.lock|package(-lock)?\.json|yarn\.lock|pnpm-lock\.yaml|\.\w+~|\.swp|\.swo|\.bak(up)?|\.old|\.tmp|\.temp|\.log|\.sql(\.gz)?|docker-compose\.yml|docker\.env|Dockerfile|\.csproj|\.sln|Cargo\.toml|Cargo\.lock|go\.mod|go\.sum|phpunit\.xml|phpunit\.xml|pom\.xml|build\.gradl|pyproject\.toml|requirements\.txt|application(-\w+)?\.(ya?ml|properties))$
    {
        return 404;
    }

    # 禁止访问的敏感目录
    location ~* /(\.git|\.svn|\.bzr|\.vscode|\.claude|\.idea|\.ssh|\.github|\.npm|\.yarn|\.pnpm|\.cache|\.husky|\.turbo|\.next|\.nuxt|node_modules|runtime)/ {
        return 404;
    }

    # ─────────────────────────────────────────────────────────────────
    # /uploads/ — 用户上传的静态媒体文件（图片、视频、音频）
    #
    # !! 修复点 1：alias 路径已更正（原路径 /miiooooo/d/... 有误）!!
    # !! 修复点 2：新增 Access-Control-Allow-Origin *                !!
    #             （Seedance / 外部 AI 模型跨域拉取素材必须）
    #
    # 若 uploads 目录不在此路径，在服务器上运行：
    #   ls /www/wwwroot/miiooaib.com/backend/uploads/
    # 确认后按实际路径修改 alias（末尾斜杠不能省）
    # ─────────────────────────────────────────────────────────────────
    location ^~ /uploads/ {
        alias /www/wwwroot/miiooaib.com/backend/uploads/;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header X-Static-Handled "nginx" always;
        expires 7d;
        access_log off;
        autoindex off;
        # 若切换站点域名或宝塔站点目录，务必同步调整 alias；
        # 否则会出现“文件已写入 backend/uploads，但创作页视频仍 404/不显示”。
        # 禁止上传目录执行脚本
        location ~* \.(php|jsp|py|sh|lua|pl)$ {
            return 403;
        }
    }

    #一键申请SSL证书验证目录相关设置
    location ~ \.well-known{
        allow all;
    }

    #禁止在证书验证目录放入敏感文件
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    # 静态图片缓存
    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$
    {
        expires      30d;
        error_log /dev/null;
        access_log /dev/null;
    }

    # JS CSS缓存
    location ~ .*\.(js|css)?$
    {
        expires      12h;
        error_log /dev/null;
        access_log /dev/null;
    }

    # ─────────────────────────────────────────────────────────────────
    # MEDIA-BPLUS 首轮主域复用：
    # - 仅有 www.miiooai.com 一个后端域名时，统一复用主域路径承接对象存储
    # - /media/origin/<bucket>/<key> -> COS 源站或对象回源网关
    # - /media/cdn/<bucket>/<key>    -> CDN 入口；若 CDN 暂未启用，可先回到同一源站
    #
    # 部署前请把下面 4 个占位值替换成真实可用地址；未替换时命中媒体路径会直接返回 503，
    # 避免把错误占位地址悄悄带进生产流量。
    # 例：
    #   set $media_origin_upstream "https://<bucket>.cos.<region>.myqcloud.com";
    #   set $media_origin_host "<bucket>.cos.<region>.myqcloud.com";
    #   set $media_cdn_upstream "https://cdn.example.com";
    #   set $media_cdn_host "cdn.example.com";
    # ─────────────────────────────────────────────────────────────────
    resolver 1.1.1.1 8.8.8.8 ipv6=off valid=300s;
    resolver_timeout 10s;
    set $media_origin_upstream "https://origin-placeholder.invalid";
    set $media_origin_host "origin-placeholder.invalid";
    set $media_cdn_upstream "https://cdn-placeholder.invalid";
    set $media_cdn_host "cdn-placeholder.invalid";

    location ~ ^/media/origin/[^/]+/(?<media_origin_path>.*)$ {
        if ($media_origin_host = "origin-placeholder.invalid") {
            return 503;
        }

        proxy_pass $media_origin_upstream/$media_origin_path$is_args$args;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $media_origin_host;
        proxy_set_header Host $media_origin_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        add_header X-Media-Proxy "origin" always;
        proxy_connect_timeout 60s;
        proxy_read_timeout    1800s;
        proxy_send_timeout    1800s;
    }

    location ~ ^/media/cdn/[^/]+/(?<media_cdn_path>.*)$ {
        if ($media_cdn_host = "cdn-placeholder.invalid") {
            return 503;
        }

        proxy_pass $media_cdn_upstream/$media_cdn_path$is_args$args;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $media_cdn_host;
        proxy_set_header Host $media_cdn_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Media-Proxy "cdn" always;
        proxy_connect_timeout 60s;
        proxy_read_timeout    1800s;
        proxy_send_timeout    1800s;
    }

    # ─────────────────────────────────────────────────────────────────
    # SSE 流式接口：必须关闭代理缓冲，否则前端会长时间收不到增量 chunk
    #
    # 当前仅覆盖仓内已落地的真实 SSE 端点：
    #   /api/llm/chat/stream
    #   /api/projects/{project_id}/episodes/{episode_id}/generate/stream
    # ─────────────────────────────────────────────────────────────────
    location ~ ^/api/(llm/chat/stream|projects/[^/]+/episodes/[^/]+/generate/stream)$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        add_header X-Accel-Buffering no;
        proxy_connect_timeout 60s;
        proxy_read_timeout    1800s;
        proxy_send_timeout    1800s;
    }

    # ─────────────────────────────────────────────────────────────────
    # 全局反向代理：所有未匹配路径转发到 FastAPI（uvicorn :8000）
    #
    # !! 修复点 3：proxy_read_timeout 从 300s 提高到 1800s            !!
    #             （Seedance 视频生成最长等待 30 分钟，原 300s 会超时）
    # ─────────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout    1800s;
        proxy_send_timeout    1800s;
    }

    access_log  /www/wwwlogs/miiooaib.com.log;
    error_log  /www/wwwlogs/miiooaib.com.error.log;
}
